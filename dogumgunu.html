<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İyi ki Doğdun Aşkım ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 80px;
      font-size: 3rem;
      animation: fadeIn 2s ease-in-out;
    }

    p {
      font-size: 1.3rem;
      margin: 20px;
      animation: fadeIn 3s ease-in-out;
    }

    .heart {
      position: absolute;
      color: red;
      animation: float 6s infinite;
      font-size: 24px;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(1); opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .cake {
      margin-top: 40px;
      font-size: 100px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    button {
      padding: 15px 30px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #ff4e50;
      font-size: 1.2rem;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      background: #ffe0e0;
    }
  </style>
</head>
<body>

  <h1>İyi ki Doğdun Aşkım 🎂</h1>
  <p>Hayatımın en güzel parçası sensin. Seninle her gün bir hediye gibi ❤️</p>

  <div class="cake">🎂</div>

  <button onclick="showMessage()">Mesajımı Aç 💌</button>

  <p id="hiddenMessage" style="display:none;">Seni çok seviyorum! İyi ki varsın ❤️</p>

  <script>
    function showMessage() {
      document.getElementById('hiddenMessage').style.display = 'block';
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
