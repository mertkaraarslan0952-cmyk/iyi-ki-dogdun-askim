<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İyi ki Doğdun ❤️</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  color:white;
  text-align:center;
}

h1{margin-top:50px;}

.slider{
  width:300px;
  height:200px;
  margin:20px auto;
  overflow:hidden;
  border-radius:15px;
}

.slider img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

.slider img.active{
  display:block;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>İyi ki Doğdun ❤️</h1>

<div class="slider">
  <img src="foto1.jpg" class="active">
  <img src="foto2.jpg">
  <img src="foto3.jpg">
</div>

<button onclick="document.getElementById('music').play()">Müzik Aç 🎶</button>

<audio id="music" loop>
  <source src="muzik.mp3" type="audio/mpeg">
</audio>

<script>
const slides=document.querySelectorAll(".slider img");
let i=0;

setInterval(()=>{
  slides[i].classList.remove("active");
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
},2000);
</script>

</body>
</html>
