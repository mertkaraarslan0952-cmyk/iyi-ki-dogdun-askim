<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İyi ki Doğdun ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    h1 { margin-top: 60px; font-size: 3rem; }
    p { font-size: 1.2rem; margin: 15px; }

    .cake { font-size: 90px; animation: bounce 2s infinite; }
    @keyframes bounce {
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-15px)}
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #ff4e50;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 15px;
    }

    /* Kalp animasyonu */
    .heart {
      position: absolute;
      color: red;
      animation: float 6s infinite;
      font-size: 20px;
    }
    @keyframes float {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    /* Foto slider */
    .slider {
      width: 300px;
      height: 200px;
      margin: 30px auto;
      overflow: hidden;
      border-radius: 15px;
    }

    .slider img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .active { display: block; }
  </style>
</head>
<body>

  <h1>İyi ki Doğdun <span id="name">Lavinya'm</span> 🎂</h1>
  <p>Sen hayatımın en güzel tesadüfüsün ❤️</p>

  <div class="cake">🎂</div>

  <button onclick="showMessage()">Mesajımı Aç 💌</button>
  <p id="hiddenMessage" style="display:none;">Seni çok seviyorum, iyi ki varsın ❤️</p>

  <!-- FOTOĞRAF SLIDER -->
  <div class="slider">
    <img src="foto1.jpg" class="active">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
  </div>

  <!-- MÜZİK -->
  <audio id="music" loop>
    <source src="muzik.mp3" type="audio/mpeg">
  </audio>
  <br>
  <button onclick="playMusic()">Müziği Başlat 🎶</button>

  <script>
    function showMessage() {
      document.getElementById('hiddenMessage').style.display = 'block';
    }

    function playMusic() {
      document.getElementById('music').play();
    }

    // Kalpler
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 300);

    // Slider
    let index = 0;
    const slides = document.querySelectorAll('.slider img');

    setInterval(() => {
      slides[index].classList.remove('active');
      index = (index + 1) % slides.length;
      slides[index].classList.add('active');
    }, 2000);

  </script>

</body>
</html>
